<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Risk Prediction</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background:#f0f4f8; display:flex; justify-content:center; align-items:center; min-height:100vh; }
        .card { background:#fff; padding:30px; border-radius:12px; box-shadow:0 10px 25px rgba(0,0,0,0.08); width:100%; max-width:500px; }
        h2 { color:#2c3e50; margin-bottom:20px; text-align:center; }
        .field { margin-bottom:15px; }
        label { display:block; margin-bottom:5px; color:#34495e; font-weight:600; }
        input, select { width:100%; padding:10px; border:1px solid #dcdde1; border-radius:6px; outline:none; transition:0.3s; }
        input:focus, select:focus { border-color:#3498db; }
        .btn { width:100%; padding:12px; background:#3498db; color:#fff; border:none; border-radius:6px; font-size:16px; font-weight:bold; cursor:pointer; transition:0.3s; margin-top:10px; }
        .btn:hover { background:#2980b9; }
        #result { margin-top:20px; font-size:18px; font-weight:600; color:#27ae60; display:none; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Heart Disease Risk Prediction</h2>
        <form id="mlForm" onsubmit="predictRisk(); return false;">
            <div class="field"><label for="age">Age</label><input type="number" id="age" required></div>
            <div class="field"><label for="sex">Sex (1 = male, 0 = female)</label><input type="number" id="sex" min="0" max="1" required></div>
            <div class="field"><label for="cp">Chest Pain Type (0-3)</label><input type="number" id="cp" min="0" max="3" required></div>
            <div class="field"><label for="trestbps">Resting Blood Pressure</label><input type="number" id="trestbps" required></div>
            <div class="field"><label for="chol">Serum Cholesterol (mg/dl)</label><input type="number" id="chol" required></div>
            <div class="field"><label for="fbs">Fasting Blood Sugar (> 120 mg/dl) (1 = true, 0 = false)</label><input type="number" id="fbs" min="0" max="1" required></div>
            <div class="field"><label for="thalach">Max Heart Rate Achieved</label><input type="number" id="thalach" required></div>
            <button type="submit" class="btn">Predict Risk</button>
        </form>
        <div id="result"></div>
    </div>

    <script src="predict.js"></script>
</body>
</html>
